<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Whitestone Partners — Video Test</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #0c1e2e;
    --gold: #b8963e;
    --white: #ffffff;
    --off-white: #f7f8fa;
    --border: #e8edf2;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--off-white);
    font-family: 'Georgia', serif;
    overflow-x: hidden;
  }

  /* ── HEADER ── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    height: 72px;
    background: rgba(247,248,250,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .logo-mark {
    width: 32px;
    height: 32px;
    border: 1.5px solid var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-mark::after {
    content: '⬦';
    color: var(--gold);
    font-size: 14px;
  }

  .logo-text {
    font-size: 13px;
    font-weight: 400;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--navy);
  }

  /* ── SPACER ── */
  .spacer { height: 72px; }

  /* ── VIDEO SECTIONS ── */
  .video-section {
    width: 100%;
    min-height: 100vh;
    display: flex;
    align-items: center;
    position: relative;
    overflow: hidden;
  }

  .video-section:nth-child(odd) {
    background: var(--white);
  }

  .video-section:nth-child(even) {
    background: var(--off-white);
  }

  .section-inner {
    width: 100%;
    max-width: 1400px;
    margin: 0 auto;
    padding: 5rem 4rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 5rem;
    align-items: center;
  }

  /* Alternate layout — video right */
  .video-section.video-right .section-inner {
    direction: rtl;
  }
  .video-section.video-right .section-inner > * {
    direction: ltr;
  }

  /* Video container */
  .video-wrap {
    position: relative;
    border-radius: 16px;
    overflow: hidden;
    box-shadow:
      0 4px 6px rgba(12,30,46,0.04),
      0 12px 40px rgba(12,30,46,0.10),
      0 40px 80px rgba(12,30,46,0.06);
    transform: translateY(40px);
    opacity: 0;
    transition: transform 0.8s cubic-bezier(0.16,1,0.3,1), opacity 0.8s ease;
  }

  .video-wrap.visible {
    transform: translateY(0);
    opacity: 1;
  }

  /* Gold corner accent */
  .video-wrap::before {
    content: '';
    position: absolute;
    top: -1px; left: -1px;
    right: -1px; bottom: -1px;
    border-radius: 17px;
    background: linear-gradient(135deg, rgba(184,150,62,0.4), transparent 40%, transparent 60%, rgba(184,150,62,0.15));
    pointer-events: none;
    z-index: 2;
  }

  video {
    display: block;
    width: 100%;
    height: auto;
    border-radius: 16px;
  }

  /* Placeholder side */
  .placeholder-side {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
    transform: translateX(-30px);
    opacity: 0;
    transition: transform 0.8s cubic-bezier(0.16,1,0.3,1) 0.15s, opacity 0.8s ease 0.15s;
  }

  .video-section.video-right .placeholder-side {
    transform: translateX(30px);
  }

  .placeholder-side.visible {
    transform: translateX(0);
    opacity: 1;
  }

  /* Gold line accent */
  .gold-line {
    width: 40px;
    height: 2px;
    background: var(--gold);
  }

  /* Placeholder blocks — no text per request */
  .block-lg {
    height: 14px;
    border-radius: 7px;
    background: linear-gradient(90deg, #e2e8ee, #edf1f5, #e2e8ee);
    background-size: 200% 100%;
    animation: shimmer 2.4s ease-in-out infinite;
    width: 80%;
  }

  .block-md {
    height: 10px;
    border-radius: 5px;
    background: linear-gradient(90deg, #e2e8ee, #edf1f5, #e2e8ee);
    background-size: 200% 100%;
    animation: shimmer 2.4s ease-in-out infinite;
    width: 65%;
  }

  .block-sm {
    height: 10px;
    border-radius: 5px;
    background: linear-gradient(90deg, #e2e8ee, #edf1f5, #e2e8ee);
    background-size: 200% 100%;
    animation: shimmer 2.4s ease-in-out infinite;
    width: 50%;
  }

  .block-lg:nth-child(2) { animation-delay: 0.2s; }
  .block-md:nth-child(3) { animation-delay: 0.1s; }
  .block-sm:nth-child(4) { animation-delay: 0.3s; }

  @keyframes shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position:  200% 0; }
  }

  /* CTA placeholder */
  .cta-placeholder {
    width: 140px;
    height: 44px;
    border-radius: 6px;
    background: var(--navy);
    opacity: 0.08;
    margin-top: 0.5rem;
  }

  /* Section number */
  .section-num {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(12,30,46,0.25);
  }

  /* ── DIVIDER ── */
  .section-divider {
    width: 100%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
  }

  /* ── MOBILE ── */
  @media (max-width: 900px) {
    .section-inner {
      grid-template-columns: 1fr;
      gap: 2.5rem;
      padding: 4rem 2rem;
    }

    .video-section.video-right .section-inner {
      direction: ltr;
    }

    .placeholder-side {
      order: 2;
      transform: translateY(20px) !important;
    }

    .video-wrap {
      order: 1;
    }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="logo">
    <div class="logo-mark"></div>
    <span class="logo-text">Whitestone Partners</span>
  </div>
</header>

<div class="spacer"></div>

<!-- SECTION 1 — Video LEFT -->
<section class="video-section video-left">
  <div class="section-inner">

    <div class="video-wrap" data-reveal>
      <video autoplay muted loop playsinline>
        <source src="d4882d6f-01c8-4cc7-916f-f31ce23fb71e.mp4" type="video/mp4">
      </video>
    </div>

    <div class="placeholder-side" data-reveal-text>
      <span class="section-num">01</span>
      <div class="gold-line"></div>
      <div class="block-lg"></div>
      <div class="block-md"></div>
      <div class="block-sm"></div>
      <div style="height:0.5rem;"></div>
      <div class="block-lg" style="width:90%;"></div>
      <div class="block-md" style="width:75%;"></div>
      <div class="cta-placeholder"></div>
    </div>

  </div>
</section>

<div class="section-divider"></div>

<!-- SECTION 2 — Video RIGHT -->
<section class="video-section video-right">
  <div class="section-inner">

    <div class="video-wrap" data-reveal>
      <video autoplay muted loop playsinline>
        <source src="grok-video-0203cf81-d0b1-43ef-9cae-455f0c33e2d7.mp4" type="video/mp4">
      </video>
    </div>

    <div class="placeholder-side" data-reveal-text>
      <span class="section-num">02</span>
      <div class="gold-line"></div>
      <div class="block-lg" style="width:70%;"></div>
      <div class="block-md"></div>
      <div class="block-sm" style="width:60%;"></div>
      <div style="height:0.5rem;"></div>
      <div class="block-lg" style="width:85%;"></div>
      <div class="block-md" style="width:70%;"></div>
      <div class="cta-placeholder"></div>
    </div>

  </div>
</section>

<div class="section-divider"></div>

<!-- SECTION 3 — Video LEFT -->
<section class="video-section video-left">
  <div class="section-inner">

    <div class="video-wrap" data-reveal>
      <video autoplay muted loop playsinline>
        <source src="grok-video-ea25a0f0-449a-40db-8b90-41c69e11e058.mp4" type="video/mp4">
      </video>
    </div>

    <div class="placeholder-side" data-reveal-text>
      <span class="section-num">03</span>
      <div class="gold-line"></div>
      <div class="block-lg" style="width:75%;"></div>
      <div class="block-md" style="width:55%;"></div>
      <div class="block-sm"></div>
      <div style="height:0.5rem;"></div>
      <div class="block-lg" style="width:88%;"></div>
      <div class="block-md" style="width:65%;"></div>
      <div class="cta-placeholder"></div>
    </div>

  </div>
</section>

<div class="section-divider"></div>

<!-- SECTION 4 — Video RIGHT -->
<section class="video-section video-right">
  <div class="section-inner">

    <div class="video-wrap" data-reveal>
      <video autoplay muted loop playsinline>
        <source src="grok-video-f368cb51-2832-4359-b5f3-8253fa47a1a0.mp4" type="video/mp4">
      </video>
    </div>

    <div class="placeholder-side" data-reveal-text>
      <span class="section-num">04</span>
      <div class="gold-line"></div>
      <div class="block-lg" style="width:78%;"></div>
      <div class="block-md" style="width:62%;"></div>
      <div class="block-sm" style="width:45%;"></div>
      <div style="height:0.5rem;"></div>
      <div class="block-lg" style="width:92%;"></div>
      <div class="block-md" style="width:72%;"></div>
      <div class="cta-placeholder"></div>
    </div>

  </div>
</section>

<script>
  // Scroll reveal
  var observer = new IntersectionObserver(function(entries) {
    entries.forEach(function(entry) {
      if (!entry.isIntersecting) return;
      entry.target.classList.add('visible');
      observer.unobserve(entry.target);
    });
  }, { threshold: 0.12 });

  document.querySelectorAll('[data-reveal], [data-reveal-text]').forEach(function(el) {
    observer.observe(el);
  });
</script>

</body>
</html>
